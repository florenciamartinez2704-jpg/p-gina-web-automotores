const useStorage = (key, initial) => {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; } catch { return initial; }

  const save = useCallback(v => { setVal(v); try { localStorage.setItem(key, JSON.stringify(v)); } catch{} }, [key]);

};

  return (

const Dashboard = ({ user, autos, clientes, agenda, comisiones, consultasNuevas, onVerConsultas }) => {
  const disponibles = autos.filter(a=>a.estado==="disponible").length;
  const vendidosMes = autos.filter(a=>a.estado==="vendido").length;
  const citasPendientes = agenda.filter(a=>a.estado==="pendiente").length;
  const clientesActivos = clientes.filter(c=>c.estado!=="cerrado").length;
  const comisionTotal = comisiones.filter(c=>!c.pagado).reduce((s,c)=>s+c.monto,0);

  const cards = [
    { icon:"car", label:"Autos disponibles", value:disponibles, color:"#3B82F6", bg:"#3B82F620" },
    { icon:"check", label:"Vendidos (total)", value:vendidosMes, color:"#10B981", bg:"#10B98120" },
    { icon:"calendar", label:"Citas pendientes", value:citasPendientes, color:"#F59E0B", bg:"#F59E0B20" },
    { icon:"users", label:"Clientes activos", value:clientesActivos, color:"#8B5CF6", bg:"#8B5CF620" },
    { icon:"dollar", label:"Comisión estimada", value:`$${(comisionTotal/1000).toFixed(0)}k`, color:"#EC4899", bg:"#EC489920" },
    { icon:"message", label:"Consultas nuevas", value:consultasNuevas||0, color:"#DC2626", bg:"#DC262620",
      highlight:(consultasNuevas||0)>0, onClick:onVerConsultas },
  ];

  const activity = [
    { text:"Cliente consultó por Toyota Corolla", time:"hace 10 min", icon:"car", color:"#3B82F6" },
    { text:"Nueva visita agendada – Laura Martínez", time:"hace 45 min", icon:"calendar", color:"#10B981" },
    { text:"Auto reservado – VW Vento", time:"hace 2 h", icon:"star", color:"#F59E0B" },
    { text:"Venta cerrada – Chevrolet Cruze", time:"hace 1 día", icon:"check", color:"#10B981" },

// ─── AUTO FORM ────────────────────────────────────────────────────────────────
const AutoForm = ({ initial={}, onSave, onClose }) => {
  const [d, setD] = useState({ marca:"", modelo:"", version:"", anio:"", km:"", color:"", motor:"", combustible:"Nafta", caja:"Manual", patente:"", precio:"", descripcion:"", estado:"disponible", propietario:"", telPropietario:"", comision:3, extras:[], fotos:[], docs:[], ...initial });
  const upd = (k,v) => setD(p=>({...p,[k]:v}));
  const toggleExtra = k => setD(p=>({ ...p, extras: p.extras.includes(k) ? p.extras.filter(e=>e!==k) : [...p.extras,k] }));
  const handleFileChange = e => {
    const files = Array.from(e.target.files);
    files.forEach(f => {
      const reader = new FileReader();
      reader.onload = ev => setD(p=>({ ...p, fotos:[...p.fotos,{ url:ev.target.result, name:f.name }] }));
      reader.readAsDataURL(f);
    });
  };
  const extrasList = [
    {k:"aire",l:"Aire acondicionado"},{k:"cuero",l:"Cuero"},{k:"pantalla",l:"Pantalla"},
    {k:"camara",l:"Cámara"},{k:"sensores",l:"Sensores"},{k:"GPS",l:"GPS"},
    {k:"techo",l:"Techo panorámico"},{k:"service",l:"Service oficial"}
  ];

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:16 }}>
        <Field label="Marca"><Input value={d.marca} onChange={v=>upd("marca",v)} placeholder="Toyota"/></Field>
        <Field label="Modelo"><Input value={d.modelo} onChange={v=>upd("modelo",v)} placeholder="Corolla"/></Field>
        <Field label="Versión"><Input value={d.version} onChange={v=>upd("version",v)} placeholder="XEI 2.0"/></Field>
        <Field label="Año"><Input value={d.anio} onChange={v=>upd("anio",v)} type="number" placeholder="2022"/></Field>
        <Field label="Kilómetros"><Input value={d.km} onChange={v=>upd("km",v)} type="number" placeholder="28000"/></Field>
        <Field label="Color"><Input value={d.color} onChange={v=>upd("color",v)} placeholder="Blanco"/></Field>
        <Field label="Motor"><Input value={d.motor} onChange={v=>upd("motor",v)} placeholder="2.0"/></Field>
        <Field label="Combustible">
          <Select value={d.combustible} onChange={v=>upd("combustible",v)}>
            <option>Nafta</option><option>Diesel</option><option>GNC</option><option>Híbrido</option><option>Eléctrico</option>
          </Select>
        </Field>
        <Field label="Caja">
          <Select value={d.caja} onChange={v=>upd("caja",v)}>
            <option>Manual</option><option>Automática</option><option>CVT</option>
          </Select>
        </Field>
        <Field label="Patente"><Input value={d.patente} onChange={v=>upd("patente",v)} placeholder="AB123CD"/></Field>
        <Field label="Precio ($)"><Input value={d.precio} onChange={v=>upd("precio",v)} type="number" placeholder="25000000"/></Field>
        <Field label="Estado">
          <Select value={d.estado} onChange={v=>upd("estado",v)}>
            <option value="disponible">Disponible</option><option value="reservado">Reservado</option><option value="vendido">Vendido</option>
          </Select>
        </Field>
        <Field label="Propietario"><Input value={d.propietario} onChange={v=>upd("propietario",v)} placeholder="Nombre del dueño"/></Field>
        <Field label="Tel. propietario"><Input value={d.telPropietario} onChange={v=>upd("telPropietario",v)} placeholder="2604111222"/></Field>
        <Field label="Comisión (%)"><Input value={d.comision} onChange={v=>upd("comision",v)} type="number" placeholder="3"/></Field>
        <Field label="Descripción" col={2}><Textarea value={d.descripcion} onChange={v=>upd("descripcion",v)} placeholder="Descripción del vehículo..."/></Field>
      </div>

      {/* Extras */}
      <div>
        <label style={{ display:"block", fontSize:13, fontWeight:600, color:"#94A3B8", marginBottom:10 }}>Equipamiento</label>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8 }}>
          {extrasList.map(e => (
            <label key={e.k} style={{ display:"flex", alignItems:"center", gap:6, cursor:"pointer", fontSize:13, color: d.extras.includes(e.k) ? "#3B82F6" : "#9CA3AF", background: d.extras.includes(e.k) ? "#2563EB20" : "#111827", border: `1px solid ${d.extras.includes(e.k)?"#2563EB":"#374151"}`, borderRadius:8, padding:"8px 10px" }}>
              <input type="checkbox" checked={d.extras.includes(e.k)} onChange={()=>toggleExtra(e.k)} style={{ accentColor:"#3B82F6" }}/>{e.l}
            </label>
          ))}
        </div>
      </div>

      {/* Fotos */}
      <div>
        <label style={{ display:"block", fontSize:13, fontWeight:600, color:"#94A3B8", marginBottom:10 }}>Fotos del vehículo</label>
        <label style={{ display:"flex", alignItems:"center", gap:8, background:"#0A0F1E", border:"2px dashed #374151", borderRadius:12, padding:20, cursor:"pointer", color:"#64748B", justifyContent:"center" }}>
          <Icon name="upload" size={20}/> Subir fotos (múltiples)
          <input type="file" accept="image/*" multiple onChange={handleFileChange} style={{ display:"none" }}/>
        </label>
        {d.fotos.length > 0 && (
          <div style={{ display:"flex", gap:8, marginTop:12, overflowX:"auto", paddingBottom:8 }}>
            {d.fotos.map((f,i) => (
              <div key={i} style={{ position:"relative", flexShrink:0 }}>
                <img src={f.url} alt="" style={{ width:80, height:60, objectFit:"cover", borderRadius:8, border:"2px solid #374151" }}/>
                <button onClick={()=>setD(p=>({...p,fotos:p.fotos.filter((_,j)=>j!==i)}))} style={{ position:"absolute", top:-6, right:-6, width:18, height:18, borderRadius:"50%", background:"#EF4444", border:"none", color:"#fff", cursor:"pointer", fontSize:10, display:"flex", alignItems:"center", justifyContent:"center" }}>×</button>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{ display:"flex", gap:12, justifyContent:"flex-end" }}>
        <Btn onClick={onClose} variant="secondary">Cancelar</Btn>
        <Btn onClick={()=>onSave(d)} variant="primary" icon="check">Guardar auto</Btn>
      </div>
    </div>
  );
};

// ─── MÓDULO AUTOS ─────────────────────────────────────────────────────────────
const ModuloAutos = ({ autos, setAutos }) => {
  const [search, setSearch] = useState("");
  const [filterMarca, setFilterMarca] = useState("");
  const [filterEstado, setFilterEstado] = useState("");
  const [sortBy, setSortBy] = useState("recientes");
  const [showForm, setShowForm] = useState(false);
  const [editAuto, setEditAuto] = useState(null);
  const [viewAuto, setViewAuto] = useState(null);

  const marcas = [...new Set(autos.map(a=>a.marca))];
  let filtered = autos.filter(a => {
    const q = search.toLowerCase();
    return (!q || `${a.marca} ${a.modelo} ${a.patente}`.toLowerCase().includes(q))
      && (!filterMarca || a.marca === filterMarca)
      && (!filterEstado || a.estado === filterEstado);
  });
  if (sortBy==="menor") filtered.sort((a,b)=>a.precio-b.precio);
  else if (sortBy==="mayor") filtered.sort((a,b)=>b.precio-a.precio);
  else filtered.sort((a,b)=>b.id-a.id);

  const saveAuto = d => {
    if (editAuto) {
      setAutos(autos.map(a=>a.id===editAuto.id?{...a,...d}:a));
    } else {
      setAutos([...autos, { ...d, id:Date.now() }]);
    }
    setShowForm(false); setEditAuto(null);
  };

  const deleteAuto = id => { if (confirm("¿Eliminar auto?")) setAutos(autos.filter(a=>a.id!==id)); };
  const markSold = id => setAutos(autos.map(a=>a.id===id?{...a,estado:"vendido"}:a));

  return (
    <div style={{ padding:24 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:24, flexWrap:"wrap", gap:12 }}>
        <h1 style={{ margin:0, fontSize:24, fontWeight:800, color:"#F9FAFB" }}>🚗 Autos</h1>
        <Btn onClick={()=>{setEditAuto(null);setShowForm(true);}} variant="primary" icon="plus">Nuevo Auto</Btn>
      </div>

      {/* Filters */}
      <div style={{ display:"flex", gap:10, marginBottom:20, flexWrap:"wrap" }}>
        <div style={{ position:"relative", flex:1, minWidth:200 }}>
          <div style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:"#475569" }}><Icon name="search" size={16}/></div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por marca, modelo, patente..."
            style={{ width:"100%", background:"#1E293B", border:"1px solid #334155", borderRadius:10, padding:"10px 12px 10px 36px", color:"#F9FAFB", fontSize:14, outline:"none", boxSizing:"border-box" }}/>
        </div>
        <select value={filterMarca} onChange={e=>setFilterMarca(e.target.value)} style={{ background:"#1E293B", border:"1px solid #334155", borderRadius:10, padding:"10px 12px", color:"#F9FAFB", fontSize:14 }}>
          <option value="">Todas las marcas</option>
          {marcas.map(m=><option key={m}>{m}</option>)}
        </select>
        <select value={filterEstado} onChange={e=>setFilterEstado(e.target.value)} style={{ background:"#1E293B", border:"1px solid #334155", borderRadius:10, padding:"10px 12px", color:"#F9FAFB", fontSize:14 }}>
          <option value="">Todos los estados</option>
          <option value="disponible">Disponible</option>
          <option value="reservado">Reservado</option>
          <option value="vendido">Vendido</option>
        </select>
        <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{ background:"#1E293B", border:"1px solid #334155", borderRadius:10, padding:"10px 12px", color:"#F9FAFB", fontSize:14 }}>
          <option value="recientes">Más recientes</option>
          <option value="menor">Menor precio</option>
          <option value="mayor">Mayor precio</option>
        </select>
      </div>

      {/* Grid */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:16 }}>
        {filtered.map(auto => (
          <div key={auto.id} style={{ background:"#1E293B", borderRadius:16, border:"1px solid #334155", overflow:"hidden", transition:"all .2s" }}
            onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-4px)";e.currentTarget.style.boxShadow="0 12px 30px #00000050";}}
            onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
            {/* Photo */}
            <div style={{ height:160, background:"#0A0F1E", display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
              {auto.fotos && auto.fotos.length > 0
                ? <img src={auto.fotos[0].url} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                : <div style={{ color:"#334155" }}><Icon name="car" size={48}/></div>}
              <div style={{ position:"absolute", top:10, right:10 }}><StatusBadge status={auto.estado}/></div>
            </div>
            <div style={{ padding:16 }}>
              <div style={{ fontSize:18, fontWeight:700, color:"#F9FAFB", marginBottom:4 }}>{auto.marca} {auto.modelo}</div>
              <div style={{ fontSize:13, color:"#64748B", marginBottom:8 }}>{auto.version} · {auto.anio}</div>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:12 }}>
                <span style={{ fontSize:13, color:"#94A3B8" }}>🛣️ {Number(auto.km).toLocaleString()} km</span>
                <span style={{ fontSize:13, color:"#94A3B8" }}>🎨 {auto.color}</span>
              </div>
              <div style={{ fontSize:22, fontWeight:800, color:"#3B82F6", marginBottom:16 }}>${Number(auto.precio).toLocaleString("es-AR")}</div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                <Btn onClick={()=>setViewAuto(auto)} variant="primary" size="sm" icon="eye">Ver</Btn>
                <Btn onClick={()=>{setEditAuto(auto);setShowForm(true);}} variant="secondary" size="sm" icon="edit">Editar</Btn>
                <Btn onClick={()=>{ const m=`${auto.marca} ${auto.modelo} ${auto.anio} - $${Number(auto.precio).toLocaleString()} - Automotores499 📱2604127531`; navigator.clipboard?.writeText(m); alert("Copiado!"); }} variant="ghost" size="sm" icon="share">Compartir</Btn>
                {auto.estado!=="vendido" && <Btn onClick={()=>markSold(auto.id)} variant="success" size="sm">Vendido</Btn>}
                <Btn onClick={()=>deleteAuto(auto.id)} variant="danger" size="sm" icon="trash"/>
              </div>
            </div>
          </div>
        ))}

// ─── MÓDULO AGENDA ────────────────────────────────────────────────────────────
const ModuloAgenda = ({ agenda, setAgenda }) => {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ cliente:"", auto:"", fecha:"", hora:"", ubicacion:"Agencia", nota:"", estado:"pendiente" });

  const colorMap = { pendiente:"#3B82F6", confirmado:"#10B981", reprogramado:"#F59E0B", cancelado:"#EF4444" };

  const saveCita = () => {
    if (!form.cliente || !form.fecha) return;
    setAgenda([...agenda, { ...form, id:Date.now() }]);
    setShowForm(false);
    setForm({ cliente:"", auto:"", fecha:"", hora:"", ubicacion:"Agencia", nota:"", estado:"pendiente" });
  };

  const updateEstado = (id, estado) => setAgenda(agenda.map(a=>a.id===id?{...a,estado}:a));
  const deleteCita = id => { if(confirm("¿Eliminar cita?")) setAgenda(agenda.filter(a=>a.id!==id)); };

  const today = new Date().toISOString().split("T")[0];
  const upcoming = agenda.filter(a=>a.fecha >= today).sort((a,b)=>a.fecha.localeCompare(b.fecha)||a.hora.localeCompare(b.hora));
  const past = agenda.filter(a=>a.fecha < today).sort((a,b)=>b.fecha.localeCompare(a.fecha));

  return (
    <div style={{ padding:24 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:24 }}>
        <h1 style={{ margin:0, fontSize:24, fontWeight:800, color:"#F9FAFB" }}>📅 Agenda</h1>
        <Btn onClick={()=>setShowForm(true)} variant="primary" icon="plus">Nueva Cita</Btn>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20 }}>
        {/* Upcoming */}
        <div>
          <h3 style={{ fontSize:16, fontWeight:700, color:"#F9FAFB", marginBottom:16 }}>Próximas citas ({upcoming.length})</h3>
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            {upcoming.map(c=>(
              <div key={c.id} style={{ background:"#1E293B", borderRadius:14, padding:16, border:`1px solid ${colorMap[c.estado]}40`, borderLeft:`4px solid ${colorMap[c.estado]}` }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
                  <div>
                    <div style={{ fontSize:16, fontWeight:700, color:"#F9FAFB" }}>{c.cliente}</div>
                    <div style={{ fontSize:13, color:"#94A3B8" }}>🚗 {c.auto}</div>
                  </div>
                  <StatusBadge status={c.estado}/>
                </div>
                <div style={{ display:"flex", gap:16, fontSize:13, color:"#64748B", marginBottom:10 }}>
                  <span>📅 {c.fecha}</span>
                  <span>🕐 {c.hora}</span>
                  <span>📍 {c.ubicacion}</span>
                </div>
                {c.nota && <div style={{ fontSize:13, color:"#94A3B8", marginBottom:10 }}>📝 {c.nota}</div>}
                <div style={{ display:"flex", gap:8 }}>
                  <Btn onClick={()=>updateEstado(c.id,"confirmado")} variant="success" size="sm">Confirmar</Btn>
                  <Btn onClick={()=>updateEstado(c.id,"reprogramado")} variant="secondary" size="sm">Reprogramar</Btn>
                  <Btn onClick={()=>updateEstado(c.id,"cancelado")} variant="danger" size="sm">Cancelar</Btn>
                  <Btn onClick={()=>deleteCita(c.id)} variant="ghost" size="sm" icon="trash"/>
                </div>
              </div>
            ))}
            {upcoming.length===0 && <div style={{ color:"#475569", textAlign:"center", padding:30 }}>No hay citas próximas</div>}
          </div>
        </div>

        {/* Past */}
        <div>
          <h3 style={{ fontSize:16, fontWeight:700, color:"#F9FAFB", marginBottom:16 }}>Historial ({past.length})</h3>
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            {past.slice(0,5).map(c=>(
              <div key={c.id} style={{ background:"#1E293B", borderRadius:14, padding:16, border:"1px solid #334155", opacity:0.7 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div>
                    <div style={{ fontSize:14, fontWeight:600, color:"#F9FAFB" }}>{c.cliente}</div>
                    <div style={{ fontSize:12, color:"#64748B" }}>🚗 {c.auto} · {c.fecha} {c.hora}</div>
                  </div>
                  <StatusBadge status={c.estado}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <Modal open={showForm} onClose={()=>setShowForm(false)} title="Nueva Cita">
        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
            <Field label="Cliente"><Input value={form.cliente} onChange={v=>setForm(p=>({...p,cliente:v}))} placeholder="Nombre del cliente"/></Field>
            <Field label="Auto"><Input value={form.auto} onChange={v=>setForm(p=>({...p,auto:v}))} placeholder="Toyota Corolla"/></Field>
            <Field label="Fecha"><Input value={form.fecha} onChange={v=>setForm(p=>({...p,fecha:v}))} type="date"/></Field>
            <Field label="Hora"><Input value={form.hora} onChange={v=>setForm(p=>({...p,hora:v}))} type="time"/></Field>
            <Field label="Ubicación"><Input value={form.ubicacion} onChange={v=>setForm(p=>({...p,ubicacion:v}))} placeholder="Agencia"/></Field>
            <Field label="Estado">
              <Select value={form.estado} onChange={v=>setForm(p=>({...p,estado:v}))}>
                <option value="pendiente">Pendiente</option>
                <option value="confirmado">Confirmado</option>
                <option value="reprogramado">Reprogramado</option>
                <option value="cancelado">Cancelado</option>
              </Select>
            </Field>
          </div>
          <Field label="Nota"><Textarea value={form.nota} onChange={v=>setForm(p=>({...p,nota:v}))} placeholder="Observaciones..."/></Field>
          <div style={{ display:"flex", gap:12, justifyContent:"flex-end" }}>
            <Btn onClick={()=>setShowForm(false)} variant="secondary">Cancelar</Btn>
            <Btn onClick={saveCita} variant="primary" icon="check">Guardar cita</Btn>
          </div>
        </div>
      </Modal>
    </div>
  );
};

// ─── MÓDULO COMISIONES ────────────────────────────────────────────────────────
const ModuloComisiones = ({ comisiones, setComisiones }) => {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ auto:"", precio:"", porcentaje:3, fecha:new Date().toISOString().split("T")[0], pagado:false });

  const pendiente = comisiones.filter(c=>!c.pagado).reduce((s,c)=>s+c.monto,0);
  const cobrado = comisiones.filter(c=>c.pagado).reduce((s,c)=>s+c.monto,0);
  const total = pendiente + cobrado;

  const saveComision = () => {
    if (!form.auto || !form.precio) return;
    const monto = (Number(form.precio) * Number(form.porcentaje)) / 100;
    setComisiones([...comisiones, { ...form, monto, id:Date.now() }]);
    setShowForm(false);
    setForm({ auto:"", precio:"", porcentaje:3, fecha:new Date().toISOString().split("T")[0], pagado:false });
  };

  const togglePago = id => setComisiones(comisiones.map(c=>c.id===id?{...c,pagado:!c.pagado}:c));
  const del = id => { if(confirm("¿Eliminar?")) setComisiones(comisiones.filter(c=>c.id!==id)); };

  return (
    <div style={{ padding:24 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:24 }}>
        <h1 style={{ margin:0, fontSize:24, fontWeight:800, color:"#F9FAFB" }}>💵 Comisiones</h1>
        <Btn onClick={()=>setShowForm(true)} variant="primary" icon="plus">Nueva Comisión</Btn>
      </div>

      {/* Summary */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:16, marginBottom:28 }}>
        {[
          { label:"Pendiente de cobro", value:pendiente, color:"#F59E0B" },
          { label:"Cobrado", value:cobrado, color:"#10B981" },
          { label:"Total acumulado", value:total, color:"#3B82F6" },
        ].map((s,i) => (
          <div key={i} style={{ background:"#1E293B", borderRadius:16, padding:20, border:`1px solid ${s.color}30` }}>
            <div style={{ fontSize:12, color:"#94A3B8", marginBottom:8 }}>{s.label}</div>
            <div style={{ fontSize:24, fontWeight:800, color:s.color }}>${s.value.toLocaleString("es-AR")}</div>
          </div>
        ))}
      </div>

      {/* Table */}
      <div style={{ background:"#1E293B", borderRadius:16, border:"1px solid #334155", overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ background:"#111827" }}>
              {["Auto","Precio","Comisión%","Monto","Fecha","Estado","Acción"].map(h=>(
                <th key={h} style={{ padding:"12px 16px", textAlign:"left", fontSize:12, fontWeight:700, color:"#64748B", textTransform:"uppercase" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {comisiones.map(c=>(
              <tr key={c.id} style={{ borderTop:"1px solid #1E293B" }}>
                <td style={{ padding:"14px 16px", color:"#F9FAFB", fontWeight:600 }}>{c.auto}</td>
                <td style={{ padding:"14px 16px", color:"#94A3B8" }}>${Number(c.precio).toLocaleString()}</td>
                <td style={{ padding:"14px 16px", color:"#94A3B8" }}>{c.porcentaje}%</td>
                <td style={{ padding:"14px 16px", color:"#3B82F6", fontWeight:700 }}>${c.monto.toLocaleString()}</td>
                <td style={{ padding:"14px 16px", color:"#94A3B8" }}>{c.fecha}</td>
                <td style={{ padding:"14px 16px" }}><StatusBadge status={c.pagado?"confirmado":"pendiente"}/></td>
                <td style={{ padding:"14px 16px" }}>
                  <div style={{ display:"flex", gap:6 }}>
                    <Btn onClick={()=>togglePago(c.id)} variant={c.pagado?"secondary":"success"} size="sm">{c.pagado?"Pendiente":"Marcar cobrado"}</Btn>
                    <Btn onClick={()=>del(c.id)} variant="ghost" size="sm" icon="trash"/>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {comisiones.length===0 && <div style={{ textAlign:"center", padding:40, color:"#475569" }}>No hay comisiones registradas</div>}
      </div>

      <Modal open={showForm} onClose={()=>setShowForm(false)} title="Nueva Comisión">
        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
            <Field label="Auto"><Input value={form.auto} onChange={v=>setForm(p=>({...p,auto:v}))} placeholder="Toyota Corolla XEI"/></Field>
            <Field label="Precio de venta"><Input value={form.precio} onChange={v=>setForm(p=>({...p,precio:v}))} type="number" placeholder="25000000"/></Field>
            <Field label="Comisión (%)"><Input value={form.porcentaje} onChange={v=>setForm(p=>({...p,porcentaje:v}))} type="number" placeholder="3"/></Field>
            <Field label="Fecha"><Input value={form.fecha} onChange={v=>setForm(p=>({...p,fecha:v}))} type="date"/></Field>
          </div>
          {form.precio && form.porcentaje && (
            <div style={{ background:"#0A0F1E", borderRadius:10, padding:14, color:"#10B981", fontWeight:700, fontSize:18 }}>
              Comisión estimada: ${((Number(form.precio)*Number(form.porcentaje))/100).toLocaleString("es-AR")}
            </div>
          )}
          <div style={{ display:"flex", gap:12, justifyContent:"flex-end" }}>
            <Btn onClick={()=>setShowForm(false)} variant="secondary">Cancelar</Btn>
            <Btn onClick={saveComision} variant="primary" icon="check">Guardar</Btn>
          </div>
        </div>
      </Modal>
    </div>
  );
};

            </div>
            <div style={{ background:"#10B98115", border:"1px solid #10B98130", borderRadius:12, padding:16 }}>
              <div style={{ fontSize:11, color:"#10B981" }}>Cobrado</div>
              <div style={{ fontSize:20, fontWeight:800, color:"#10B981" }}>${comisiones.filter(c=>c.pagado).reduce((s,c)=>s+c.monto,0).toLocaleString()}</div>

          </div>
          {comisiones.slice(0,4).map(c=>(
            <div key={c.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 0", borderBottom:"1px solid #1E293B" }}>
              <div>
                <div style={{ fontSize:13, fontWeight:600, color:"#F9FAFB" }}>{c.auto}</div>
                <div style={{ fontSize:11, color:"#64748B" }}>{c.fecha}</div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontSize:14, fontWeight:700, color:c.pagado?"#10B981":"#F59E0B" }}>${c.monto.toLocaleString()}</div>
                <StatusBadge status={c.pagado?"confirmado":"pendiente"}/>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ─── MÓDULO CONSULTAS ────────────────────────────────────────────────────────
const FUENTES = ["Messenger","WhatsApp","Instagram","Teléfono","Web","Presencial","Otro"];
const ESTADOS_C = { nueva:"#8B5CF6", pendiente:"#F59E0B", respondida:"#3B82F6", cerrada:"#10B981" };

const ModuloConsultas = ({ consultas, setConsultas, clientes, autos }) => {
  const [search, setSearch]       = useState("");
  const [filterFuente, setFF]     = useState("");
  const [filterEstado, setFE]     = useState("");
  const [showForm, setShowForm]   = useState(false);
  const [viewC, setViewC]         = useState(null);
  const [nota, setNota]           = useState("");
  const [form, setForm] = useState({
    nombre:"", telefono:"", fuente:"Messenger", auto:"", mensaje:"",
    estado:"nueva", fecha: new Date().toISOString().split("T")[0],
    hora: new Date().toTimeString().slice(0,5), notas:[], interes:"", precio:""
  });

  const marcasAutos = [...new Set(autos.map(a=>`${a.marca} ${a.modelo} ${a.anio}`))];

  const filtered = consultas.filter(c => {
    const q = search.toLowerCase();
    return (!q || `${c.nombre} ${c.telefono} ${c.auto} ${c.mensaje}`.toLowerCase().includes(q))
      && (!filterFuente || c.fuente === filterFuente)
      && (!filterEstado || c.estado === filterEstado);
  }).sort((a,b) => b.id - a.id);

  const saveConsulta = () => {
    if (!form.nombre) return;
    setConsultas([...consultas, { ...form, id: Date.now(), notas:[] }]);
    setShowForm(false);
    setForm({ nombre:"", telefono:"", fuente:"Messenger", auto:"", mensaje:"", estado:"nueva",
      fecha: new Date().toISOString().split("T")[0], hora: new Date().toTimeString().slice(0,5), notas:[], interes:"", precio:"" });
  };

  const addNota = (id) => {
    if (!nota.trim()) return;
    setConsultas(consultas.map(c => c.id===id ? {...c, notas:[...(c.notas||[]), { texto:nota, fecha: new Date().toLocaleString("es-AR") }]} : c));
    setNota("");
    setViewC(consultas.find(c=>c.id===id));
  };

  const cambiarEstado = (id, estado) => {
    setConsultas(consultas.map(c => c.id===id ? {...c, estado} : c));
    if (viewC?.id === id) setViewC({...viewC, estado});
  };

  const del = id => { if(confirm("¿Eliminar consulta?")) { setConsultas(consultas.filter(c=>c.id!==id)); setViewC(null); }};

  const stats = {
    nueva:      consultas.filter(c=>c.estado==="nueva").length,
    pendiente:  consultas.filter(c=>c.estado==="pendiente").length,
    respondida: consultas.filter(c=>c.estado==="respondida").length,
    cerrada:    consultas.filter(c=>c.estado==="cerrada").length,
  };

  const fuenteIcon = { Messenger:"💬", WhatsApp:"📱", Instagram:"📸", Teléfono:"📞", Web:"🌐", Presencial:"🤝", Otro:"✉️" };

  return (
    <div style={{ padding:24 }}>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:24, flexWrap:"wrap", gap:12 }}>
        <div>
          <h1 style={{ margin:"0 0 4px", fontSize:24, fontWeight:800, color:"#F9FAFB" }}>💬 Consultas</h1>
          <p style={{ margin:0, fontSize:13, color:"#64748B" }}>Registrá cada mensaje de Messenger, WhatsApp o donde sea — no pierdas ninguno</p>
        </div>
        <Btn onClick={()=>setShowForm(true)} variant="primary" icon="plus">Nueva Consulta</Btn>
      </div>

      {/* Stats */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:24 }}>
        {Object.entries(stats).map(([estado, count]) => (
          <div key={estado} onClick={()=>setFE(filterEstado===estado?"":estado)}
            style={{ background:"#1E293B", borderRadius:14, padding:"16px 20px", border:`1px solid ${filterEstado===estado ? ESTADOS_C[estado] : "#374151"}`,
              cursor:"pointer", transition:"all .2s", boxShadow: filterEstado===estado ? `0 0 12px ${ESTADOS_C[estado]}44` : "none" }}>
            <div style={{ fontSize:28, fontWeight:800, color:ESTADOS_C[estado] }}>{count}</div>
            <div style={{ fontSize:12, color:"#94A3B8", textTransform:"capitalize", marginTop:2 }}>{estado}</div>
          </div>
        ))}
      </div>

      {/* Filters */}
      <div style={{ display:"flex", gap:10, marginBottom:20, flexWrap:"wrap" }}>
        <div style={{ position:"relative", flex:1, minWidth:200 }}>
          <div style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:"#475569" }}><Icon name="search" size={16}/></div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nombre, teléfono, auto..."
            style={{ width:"100%", background:"#1E293B", border:"1px solid #334155", borderRadius:10, padding:"10px 12px 10px 36px", color:"#F9FAFB", fontSize:14, outline:"none", boxSizing:"border-box" }}/>
        </div>
        <select value={filterFuente} onChange={e=>setFF(e.target.value)} style={{ background:"#1E293B", border:"1px solid #334155", borderRadius:10, padding:"10px 12px", color:"#F9FAFB", fontSize:14 }}>
          <option value="">Todas las fuentes</option>
          {FUENTES.map(f=><option key={f}>{f}</option>)}
        </select>
        <select value={filterEstado} onChange={e=>setFE(e.target.value)} style={{ background:"#1E293B", border:"1px solid #334155", borderRadius:10, padding:"10px 12px", color:"#F9FAFB", fontSize:14 }}>
          <option value="">Todos los estados</option>
          {Object.keys(ESTADOS_C).map(s=><option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}
        </select>
      </div>

      {/* List */}
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {filtered.map(c => (
          <div key={c.id} onClick={()=>setViewC(c)}
            style={{ background:"#1E293B", borderRadius:14, padding:"16px 20px", border:`1px solid ${ESTADOS_C[c.estado]}30`,
              borderLeft:`4px solid ${ESTADOS_C[c.estado]}`, cursor:"pointer", transition:"all .2s" }}
            onMouseEnter={e=>e.currentTarget.style.transform="translateX(4px)"}
            onMouseLeave={e=>e.currentTarget.style.transform="none"}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12 }}>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:6 }}>
                  <div style={{ width:36, height:36, borderRadius:"50%", background:`${ESTADOS_C[c.estado]}25`,
                    color:ESTADOS_C[c.estado], display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:16, flexShrink:0 }}>
                    {c.nombre[0]?.toUpperCase()}
                  </div>
                  <div>
                    <div style={{ fontSize:15, fontWeight:700, color:"#F9FAFB" }}>{c.nombre}</div>
                    <div style={{ fontSize:12, color:"#64748B" }}>{c.telefono}</div>
                  </div>
                </div>
                {c.auto && <div style={{ fontSize:13, color:"#94A3B8", marginBottom:4 }}>🚗 {c.auto}</div>}
                {c.mensaje && <div style={{ fontSize:13, color:"#D1D5DB", background:"#0A0F1E", borderRadius:8, padding:"6px 10px", marginTop:6, maxWidth:500 }}>"{c.mensaje}"</div>}
              </div>
              <div style={{ textAlign:"right", flexShrink:0 }}>
                <div style={{ fontSize:20 }}>{fuenteIcon[c.fuente]||"✉️"}</div>
                <div style={{ fontSize:11, color:"#64748B", marginTop:2 }}>{c.fuente}</div>
                <div style={{ fontSize:11, color:"#475569", marginTop:4 }}>{c.fecha} {c.hora}</div>
                <div style={{ marginTop:6 }}>
                  <span style={{ background:ESTADOS_C[c.estado]+"22", color:ESTADOS_C[c.estado], border:`1px solid ${ESTADOS_C[c.estado]}40`,
                    borderRadius:20, padding:"2px 8px", fontSize:11, fontWeight:600 }}>{c.estado}</span>
                </div>
                {c.notas?.length > 0 && <div style={{ fontSize:11, color:"#64748B", marginTop:4 }}>📝 {c.notas.length} nota{c.notas.length>1?"s":""}</div>}
              </div>
            </div>
          </div>
        ))}
      </div>

      {filtered.length === 0 && (
        <div style={{ textAlign:"center", padding:60, color:"#475569" }}>
          <Icon name="message" size={60}/><div style={{ marginTop:12, fontSize:18 }}>No hay consultas registradas</div>
          <div style={{ marginTop:8, fontSize:14 }}>Cuando alguien te escriba por Messenger o WhatsApp, registralo acá</div>
        </div>
      )}

      {/* FORM MODAL */}
      <Modal open={showForm} onClose={()=>setShowForm(false)} title="Nueva Consulta" wide>
        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          <div style={{ background:"#0A0F1E", borderRadius:10, padding:"12px 16px", fontSize:13, color:"#94A3B8", borderLeft:"3px solid #3B82F6" }}>
            💡 Cuando alguien te escriba por Messenger, WhatsApp o llame — registralo acá para no perderlo nunca.
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
            <Field label="Nombre del interesado">
              <Input value={form.nombre} onChange={v=>setForm(p=>({...p,nombre:v}))} placeholder="Juan García"/>
            </Field>
            <Field label="Teléfono">
              <Input value={form.telefono} onChange={v=>setForm(p=>({...p,telefono:v}))} placeholder="2604123456"/>
            </Field>
            <Field label="📣 Fuente (¿por dónde escribió?)">
              <Select value={form.fuente} onChange={v=>setForm(p=>({...p,fuente:v}))}>
                {FUENTES.map(f=><option key={f}>{f}</option>)}
              </Select>
            </Field>
            <Field label="🚗 Auto de interés">
              <select value={form.auto} onChange={e=>setForm(p=>({...p,auto:e.target.value}))}
                style={{ width:"100%", background:"#0A0F1E", border:"1px solid #334155", borderRadius:8, padding:"10px 12px", color:"#F9FAFB", fontSize:14, outline:"none", boxSizing:"border-box" }}>
                <option value="">-- Seleccionar auto --</option>
                {marcasAutos.map(m=><option key={m}>{m}</option>)}
                <option value="General / Sin especificar">General / Sin especificar</option>
              </select>
            </Field>
            <Field label="Fecha">
              <Input value={form.fecha} onChange={v=>setForm(p=>({...p,fecha:v}))} type="date"/>
            </Field>

            <Icon name="car" size={18}/> Ver vehículos disponibles
          </button>
        </div>
      </div>

      {/* Catálogo */}
      <div id="catalogo-clientes" style={{ maxWidth:1200, margin:"0 auto", padding:"40px 16px 80px", fontFamily:"'Montserrat',sans-serif" }}>
        <h2 style={{ fontSize:20, fontWeight:800, color:"#F9FAFB", marginBottom:20 }}>
          Vehículos disponibles <span style={{ fontSize:14, color:"#64748B", fontWeight:400 }}>({filtered.length})</span>
        </h2>

        {/* Buscador */}
        <div style={{ display:"flex", gap:10, marginBottom:28, flexWrap:"wrap" }}>
          <div style={{ position:"relative", flex:1, minWidth:200 }}>
            <div style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:"#475569" }}>
              <Icon name="search" size={16}/>
            </div>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por marca, modelo..."
              style={{ width:"100%", background:"#1E293B", border:"1px solid #334155", borderRadius:12,
                padding:"12px 16px 12px 40px", color:"#F9FAFB", fontSize:14, outline:"none", boxSizing:"border-box" }}/>
          </div>
          <select value={filterMarca} onChange={e=>setFF(e.target.value)}
            style={{ background:"#1E293B", border:"1px solid #334155", borderRadius:12,
              padding:"12px 16px", color:"#F9FAFB", fontSize:14, outline:"none" }}>
            <option value="">Todas las marcas</option>
            {marcas.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>

        {/* Grid */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))", gap:20 }}>
          {filtered.map(auto=>(
            <div key={auto.id}
              style={{ background:"#1E293B", borderRadius:20, border:"1px solid #334155", overflow:"hidden",
                transition:"all .3s", cursor:"pointer" }}
              onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-6px)";e.currentTarget.style.boxShadow="0 20px 40px #00000060";}}
              onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
              <div style={{ height:200, background:"#0A0F1E", display:"flex", alignItems:"center",
                justifyContent:"center", position:"relative", overflow:"hidden" }}
                onClick={()=>abrirDetalle(auto)}>
                {auto.fotos?.length > 0
                  ? <img src={auto.fotos[0].url} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                  : <div style={{ color:"#334155" }}><Icon name="car" size={64}/></div>}
                <div style={{ position:"absolute", top:12, right:12 }}><StatusBadge status={auto.estado}/></div>
                {auto.fotos?.length > 1 && (
                  <div style={{ position:"absolute", bottom:8, right:12, background:"#00000080",
                    borderRadius:20, padding:"2px 8px", fontSize:11, color:"#fff" }}>
                    📷 {auto.fotos.length}
                  </div>
                )}
              </div>
              <div style={{ padding:20 }}>
                <div style={{ fontSize:19, fontWeight:700, color:"#F9FAFB", marginBottom:3 }}
                  onClick={()=>abrirDetalle(auto)}>
                  {auto.marca} {auto.modelo}
                </div>
                <div style={{ fontSize:13, color:"#64748B", marginBottom:10 }}>{auto.version} · {auto.anio}</div>
                <div style={{ display:"flex", gap:16, fontSize:13, color:"#94A3B8", marginBottom:14 }}>
                  <span>🛣️ {Number(auto.km).toLocaleString()} km</span>
                  <span>⚙️ {auto.caja}</span>
                  <span>🎨 {auto.color}</span>
                </div>
                <div style={{ fontSize:26, fontWeight:900, color:"#3B82F6", marginBottom:16 }}>
                  ${Number(auto.precio).toLocaleString("es-AR")}
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={()=>abrirDetalle(auto)}
                    style={{ flex:1, background:"linear-gradient(135deg,#2563EB,#3B82F6)", border:"none",
                      borderRadius:10, padding:"10px", color:"#fff", fontWeight:600, fontSize:13,
                      cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                    <Icon name="eye" size={15}/> Ver más
                  </button>
                  <button onClick={()=>WA(auto)}
                    style={{ flex:1, background:"linear-gradient(135deg,#059669,#10B981)", border:"none",
                      borderRadius:10, padding:"10px", color:"#fff", fontWeight:600, fontSize:13,
                      cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                    <Icon name="whatsapp" size={15}/> WhatsApp
                  </button>
                </div>
                <button onClick={()=>abrirConsulta(auto,"visita")}
                  style={{ width:"100%", marginTop:8, background:"transparent", border:"1px solid #334155",
                    borderRadius:10, padding:"9px", color:"#94A3B8", fontWeight:600, fontSize:13,
                    cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                  <Icon name="calendar" size={14}/> Reservar visita
                </button>
              </div>
            </div>
          ))}
        </div>

        {filtered.length === 0 && (
          <div style={{ textAlign:"center", padding:80, color:"#475569" }}>
            <Icon name="car" size={80}/>
            <div style={{ marginTop:16, fontSize:20 }}>No hay vehículos disponibles en este momento</div>
            <div style={{ marginTop:8, fontSize:14 }}>Consultanos por WhatsApp para más info</div>
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{ background:"#0A0F1E", borderTop:"1px solid #1F2937", padding:"36px 20px", textAlign:"center" }}>
        <div style={{ fontSize:22, fontWeight:800, color:"#F9FAFB", marginBottom:6 }}>Automotores 499</div>
        <div style={{ fontSize:16, color:"#94A3B8", marginBottom:4 }}>📱 2604127531 – Alejandro</div>
        <p style={{ color:"#475569", fontSize:13, marginBottom:16 }}>© {new Date().getFullYear()} Automotores 499 · Mendoza, Argentina</p>
        <button onClick={onVolver}
          style={{ background:"#1E293B", border:"1px solid #334155", borderRadius:10, padding:"8px 18px",
            color:"#64748B", cursor:"pointer", fontSize:13 }}>
          ← Volver al inicio
        </button>
      </div>

      {/* Formulario flotante */}
      {showConsultaForm && (
        <div style={{ position:"fixed", inset:0, background:"#000000cc", zIndex:1000,
          display:"flex", alignItems:"flex-end", justifyContent:"center" }}
          onClick={()=>!formEnviado&&setShowConsultaForm(false)}>
          <div onClick={e=>e.stopPropagation()}
            style={{ background:"#1E293B", borderRadius:"20px 20px 0 0", width:"100%", maxWidth:600,
              padding:28, border:"1px solid #334155", maxHeight:"90vh", overflowY:"auto" }}>
            {formEnviado ? (
              <div style={{ textAlign:"center", padding:"20px 0" }}>
                <div style={{ fontSize:48, marginBottom:16 }}>✅</div>
                <h3 style={{ fontSize:20, fontWeight:800, color:"#10B981", marginBottom:8 }}>¡Consulta enviada!</h3>
                <p style={{ color:"#94A3B8", fontSize:14, marginBottom:20 }}>
                  Alejandro va a contactarte a la brevedad al {form.telefono}
                </p>
                <button onClick={()=>{setShowConsultaForm(false);setFormEnviado(false);}}
                  style={{ background:"#374151", border:"none", borderRadius:12, padding:"12px 28px",
                    color:"#F9FAFB", fontWeight:600, cursor:"pointer" }}>Cerrar</button>
              </div>
            ) : (
              <>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
                  <h3 style={{ fontSize:17, fontWeight:700, color:"#F9FAFB" }}>
                    {form.tipo==="visita" ? "🗓️ Reservar visita" : "💬 Dejar consulta"}
                  </h3>
                  <button onClick={()=>setShowConsultaForm(false)}
                    style={{ background:"#374151", border:"none", borderRadius:8, padding:8,
                      color:"#94A3B8", cursor:"pointer" }}><Icon name="x" size={16}/></button>
                </div>
                {autoConsulta && (
                  <div style={{ background:"#0A0F1E", borderRadius:10, padding:"10px 14px", marginBottom:16,
                    fontSize:13, color:"#3B82F6", fontWeight:600 }}>
                    🚗 {autoConsulta.marca} {autoConsulta.modelo} {autoConsulta.anio}
                  </div>
                )}
                <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                  <div>
                    <label style={{ display:"block", fontSize:12, fontWeight:600, color:"#94A3B8", marginBottom:6 }}>Tu nombre *</label>
                    <Input value={form.nombre} onChange={v=>setForm(p=>({...p,nombre:v}))} placeholder="Juan García"/>
                  </div>
                  <div>
                    <label style={{ display:"block", fontSize:12, fontWeight:600, color:"#94A3B8", marginBottom:6 }}>Tu teléfono *</label>
                    <Input value={form.telefono} onChange={v=>setForm(p=>({...p,telefono:v}))} placeholder="2604123456"/>
                  </div>
                  {form.tipo === "visita" && (
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                      <div>
                        <label style={{ display:"block", fontSize:12, fontWeight:600, color:"#94A3B8", marginBottom:6 }}>Fecha preferida</label>
                        <Input value={form.fecha} onChange={v=>setForm(p=>({...p,fecha:v}))} type="date"/>
                      </div>
                      <div>
                        <label style={{ display:"block", fontSize:12, fontWeight:600, color:"#94A3B8", marginBottom:6 }}>Hora preferida</label>
                        <Input value={form.hora} onChange={v=>setForm(p=>({...p,hora:v}))} type="time"/>
                      </div>
                    </div>
                  )}
                  <div>
                    <label style={{ display:"block", fontSize:12, fontWeight:600, color:"#94A3B8", marginBottom:6 }}>
                      {form.tipo==="visita" ? "Alguna observación (opcional)" : "Tu consulta"}
                    </label>
                    <Textarea value={form.mensaje} onChange={v=>setForm(p=>({...p,mensaje:v}))}
                      placeholder={form.tipo==="visita" ? "Ej: Voy con mi mecánico..." : "Ej: ¿Acepta permuta? ¿Tiene service oficial?"}
                      rows={3}/>
                  </div>
                  {(!form.nombre || !form.telefono) && (
                    <div style={{ fontSize:12, color:"#F59E0B" }}>* Nombre y teléfono son obligatorios</div>
                  )}
                  <button onClick={enviarConsulta} disabled={!form.nombre||!form.telefono}
                    style={{ background: form.nombre&&form.telefono ? "linear-gradient(135deg,#2563EB,#3B82F6)" : "#374151",
                      border:"none", borderRadius:12, padding:14, color:"#fff", fontWeight:700,
                      fontSize:15, cursor: form.nombre&&form.telefono ? "pointer" : "not-allowed" }}>
                    {form.tipo==="visita" ? "Solicitar visita" : "Enviar consulta"}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* WhatsApp flotante */}
      <a href="https://wa.me/542604127531" target="_blank"
        style={{ position:"fixed", bottom:24, right:24, width:60, height:60, borderRadius:"50%",
          background:"#25D366", display:"flex", alignItems:"center", justifyContent:"center",
          boxShadow:"0 6px 20px #25D36660", zIndex:999, textDecoration:"none", color:"#fff" }}>
        <Icon name="whatsapp" size={30}/>
      </a>
    </div>
  );
};

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [user,       setUser]       = useStorage("a499_user", null);
  const [screen,     setScreen]     = useState("portada"); // "portada" | "clientes" | "panel"
  const [activeModule, setActiveModule] = useState("dashboard");
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

  // ── todos los datos guardados, separados por usuario ──
  const uid = user?.username || "guest";
  const [autosAle,    setAutosAle]    = useStorage("a499_autos_automotores499",    SAMPLE_AUTOS);
  const [autosFlor,   setAutosFlor]   = useStorage("a499_autos_florencia499",      SAMPLE_AUTOS);
  const [clientesAle, setClientesAle] = useStorage("a499_clientes_automotores499", SAMPLE_CLIENTES);
  const [clientesFlor,setClientesFlor]= useStorage("a499_clientes_florencia499",   SAMPLE_CLIENTES);
  const [agendaAle,   setAgendaAle]   = useStorage("a499_agenda_automotores499",   SAMPLE_AGENDA);
  const [agendaFlor,  setAgendaFlor]  = useStorage("a499_agenda_florencia499",     SAMPLE_AGENDA);
  const [comisAle,    setComisAle]    = useStorage("a499_comis_automotores499",    SAMPLE_COMISIONES);
  const [comisFlor,   setComisFlor]   = useStorage("a499_comis_florencia499",      SAMPLE_COMISIONES);

  // consultas públicas — compartidas, para que ambos admin las vean
  const [consultasPublicas, setConsultasPublicas] = useStorage("a499_consultas_publicas", []);

  // consultas internas de cada admin
  const [consultasAle,  setConsultasAle]  = useStorage("a499_consultas_automotores499", []);
  const [consultasFlor, setConsultasFlor] = useStorage("a499_consultas_florencia499",   []);

  const autos        = uid === "florencia499" ? autosFlor    : autosAle;
  const setAutos     = uid === "florencia499" ? setAutosFlor : setAutosAle;
  const clientes     = uid === "florencia499" ? clientesFlor    : clientesAle;
  const setClientes  = uid === "florencia499" ? setClientesFlor : setClientesAle;
  const agenda       = uid === "florencia499" ? agendaFlor    : agendaAle;
  const setAgenda    = uid === "florencia499" ? setAgendaFlor : setAgendaAle;
  const comisiones   = uid === "florencia499" ? comisFlor    : comisAle;
  const setComisiones= uid === "florencia499" ? setComisFlor : setComisAle;
  const consultas    = uid === "florencia499" ? consultasFlor    : consultasAle;
  const setConsultas = uid === "florencia499" ? setConsultasFlor : setConsultasAle;

  // autos visibles públicamente = los de AMBOS admins juntos (para el catálogo de clientes)
  const autosPublicos = [...autosAle, ...autosFlor].filter(a => a.estado !== "vendido");

  const handleLogin  = userData => { setUser(userData); setScreen("panel"); setActiveModule("dashboard"); };
  const handleLogout = () => { setUser(null); setScreen("portada"); };

  // ── PORTADA ──
  if (screen === "portada") return (
    <Portada
      onAdmin={() => { /* la Portada maneja el login internamente y llama onAdmin con el user */ }}
      onAdminLogin={handleLogin}
      onClientes={() => setScreen("clientes")}
    />
  );

  // ── VISTA CLIENTES ──
  if (screen === "clientes") return (
    <VistaClientes
      autos={autosPublicos}
      consultas={consultasPublicas}
      setConsultas={setConsultasPublicas}
      onVolver={() => setScreen("portada")}
    />
  );

  const renderModule = () => {
    switch(activeModule) {
      case "dashboard": return <Dashboard user={user} autos={autos} clientes={clientes} agenda={agenda} comisiones={comisiones} consultasNuevas={[...(consultasPublicas||[]),...(consultas||[])].filter(c=>c.estado==="nueva").length} onVerConsultas={()=>setActiveModule("consultas")}/>;
      case "autos": return <ModuloAutos autos={autos} setAutos={setAutos}/>;
      case "clientes": return <ModuloClientes clientes={clientes} setClientes={setClientes} autos={autos}/>;
      case "agenda": return <ModuloAgenda agenda={agenda} setAgenda={setAgenda}/>;
      case "comisiones": return <ModuloComisiones comisiones={comisiones} setComisiones={setComisiones}/>;
      case "documentos": return <ModuloDocumentos autos={autos}/>;
      case "reportes": return <ModuloReportes autos={autos} clientes={clientes} agenda={agenda} comisiones={comisiones}/>;
      case "consultas": return <ModuloConsultas consultas={[...(consultasPublicas||[]), ...(consultas||[])]} setConsultas={(updated) => { const publicas = updated.filter(c=>c.fuente==="Web"); const internas = updated.filter(c=>c.fuente!=="Web"); setConsultasPublicas(publicas); setConsultas(internas); }} clientes={clientes} autos={autos}/>;
      case "configuracion": return <ModuloConfiguracion user={user}/>;
      default: return <Dashboard user={user} autos={autos} clientes={clientes} agenda={agenda} comisiones={comisiones}/>;
    }
  };

  return (
    <div style={{ minHeight:"100vh", background:"#0F172A", fontFamily:"'Montserrat',sans-serif", display:"flex", flexDirection:"column" }}>
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
      <div style={{ display:"flex", flex:1, overflow:"hidden", height:"100vh" }}>
        <Sidebar activeModule={activeModule} onNavigate={setActiveModule} user={user} collapsed={sidebarCollapsed} onToggle={()=>setSidebarCollapsed(!sidebarCollapsed)}/>
        <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <Header user={user} onLogout={handleLogout} onToggleSidebar={()=>setSidebarCollapsed(!sidebarCollapsed)} consultasNuevas={[...(consultasPublicas||[]),...(consultas||[])].filter(c=>c.estado==="nueva").length} onVerConsultas={()=>setActiveModule("consultas")}/>
          <main style={{ flex:1, overflowY:"auto" }}>
            {renderModule()}
          </main>
          <div style={{ background:"#0A0F1E", borderTop:"1px solid #1E293B", padding:"10px 24px", fontSize:11, color:"#334155", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span>Automotores 499</span>
            <span>📱 2604127531 – Alejandro</span>
          </div>
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
